<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLawn AI Dashboard</title>
    <style>
:root {
    --bg-color: #0f172a;
    --panel-bg: rgba(30, 41, 59, 0.7);
    --panel-border: rgba(255, 255, 255, 0.1);
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --accent-blue: #38bdf8;
    --accent-green: #34d399;
    --accent-orange: #fb923c;
    --glass-blur: blur(12px);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
}

body {
    background: var(--bg-color);
    background-image: radial-gradient(circle at top right, rgba(56, 189, 248, 0.1), transparent 40%),
                      radial-gradient(circle at bottom left, rgba(52, 211, 153, 0.05), transparent 40%);
    color: var(--text-main);
    padding: 5px;
    margin: 0;
    overflow-x: hidden;
}

.dashboard-container {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.glass-panel {
    background: var(--panel-bg);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    padding: 14px;
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
}

.header-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
}

h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.5px;
    background: linear-gradient(to right, var(--text-main), var(--accent-blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.weather-info {
    display: flex;
    gap: 16px;
}

.weather-item {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
}

.weather-icon {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.weather-value {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent-blue);
}

.status-banner {
    background: rgba(0, 0, 0, 0.2);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-muted);
}

.status-indicator {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background-color: var(--text-muted);
    transition: all 0.3s ease;
}

.status-indicator.active {
    background-color: var(--accent-blue);
    box-shadow: 0 0 10px var(--accent-blue), 0 0 20px var(--accent-blue);
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(0.95); opacity: 1; }
    50% { transform: scale(1.1); opacity: 0.7; }
    100% { transform: scale(0.95); opacity: 1; }
}

.zones-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 12px;
}

.zone-card {
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.zone-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
}

.zone-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.zone-name {
    font-size: 16px;
    font-weight: 500;
}

.zone-status {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.05);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.zone-status.watering {
    background: rgba(56, 189, 248, 0.1);
    color: var(--accent-blue);
    border: 1px solid rgba(56, 189, 248, 0.3);
}

.zone-status.waiting {
    background: rgba(251, 146, 60, 0.1);
    color: var(--accent-orange);
    border: 1px solid rgba(251, 146, 60, 0.3);
}

.moisture-display {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.moisture-label {
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
}

.moisture-value {
    font-weight: 600;
    color: var(--text-main);
}

.progress-track {
    height: 8px;
    background: rgba(0, 0, 0, 0.3);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent-green), var(--accent-blue));
    border-radius: 4px;
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
}

.zone-footer {
    display: flex;
    justify-content: space-between;
    border-top: 1px solid var(--panel-border);
    padding-top: 12px;
    margin-top: auto;
}

.stat-item {
    display: flex;
    flex-direction: column;
}

.stat-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.stat-value {
    font-size: 14px;
    font-weight: 500;
}

/* Settings Styles */
.settings-panel {
    margin-top: 12px;
}
.settings-header {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 16px;
    color: var(--text-main);
}
.settings-list {
    display: flex;
    flex-direction: column;
    gap: 16px;
}
.setting-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.setting-label {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 15px;
    color: var(--text-main);
}
.setting-icon {
    font-size: 18px;
    opacity: 0.8;
}
.setting-control {
    display: flex;
    align-items: center;
    gap: 12px;
}
.setting-value {
    min-width: 60px;
    text-align: right;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-main);
}

/* Toggle Switch */
.switch {
    position: relative;
    display: inline-block;
    width: 44px;
    height: 24px;
}
.switch input { 
    opacity: 0;
    width: 0;
    height: 0;
}
.slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: rgba(255, 255, 255, 0.1);
    transition: .4s;
    border-radius: 24px;
}
.slider:before {
    position: absolute;
    content: "";
    height: 18px;
    width: 18px;
    left: 3px;
    bottom: 3px;
    background-color: var(--text-main);
    transition: .4s;
    border-radius: 50%;
}
input:checked + .slider {
    background-color: var(--accent-green);
}
input:checked + .slider:before {
    transform: translateX(20px);
}

/* Range Slider */
input[type=range] {
    -webkit-appearance: none;
    width: 120px;
    background: transparent;
}
input[type=range]:focus {
    outline: none;
}
input[type=range]::-webkit-slider-runnable-track {
    width: 100%;
    height: 6px;
    cursor: pointer;
    background: #334155;
    border-radius: 3px;
}
input[type=range]::-webkit-slider-thumb {
    height: 16px;
    width: 16px;
    border-radius: 50%;
    background: var(--accent-green);
    cursor: pointer;
    -webkit-appearance: none;
    margin-top: -5px;
    box-shadow: 0 0 10px rgba(52, 211, 153, 0.4);
}
@media (max-width: 400px) {
    .setting-label { font-size: 13px; }
    input[type=range] { width: 80px; }
}

</style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <header class="glass-panel">
            <div class="header-content">
                <div class="weather-info">
                    <div class="weather-item">
                        <span class="weather-icon">&#x2602; Heute</span>
                        <span id="rainToday" class="weather-value">-- mm</span>
                    </div>
                    <div class="weather-item">
                        <span class="weather-icon">&#x2602; Morgen</span>
                        <span id="rainTomorrow" class="weather-value">-- mm</span>
                    </div>
                </div>
            </div>
            <div class="status-banner" id="statusBanner">
                <div class="status-indicator" id="statusIndicator"></div>
                <span id="summaryStatus">Initialisiere System...</span>
            </div>
        </header>

        <!-- Zonen Container -->
        <main class="zones-container" id="zonesContainer">
            <!-- Zonen werden dynamisch aus config.js generiert -->
        </main>

        <!-- Einstellungen Container -->
        <section class="glass-panel settings-panel">
            <h2 class="settings-header">Einstellungen</h2>
            <div class="settings-list" id="settingsContainer">
                <!-- Settings rendered dynamically -->
            </div>
        </section>
    </div>

    <!-- App Logik -->
    <script>
let isInitialized = false;

function handleMessage(dataRaw) {
    let data;
    try {
        data = typeof dataRaw === 'string' ? JSON.parse(dataRaw) : dataRaw;
    } catch (e) {
        console.error("Invalid data format", e);
        return;
    }

    if (!isInitialized && data.zones) {
        initDashboard(data);
        isInitialized = true;
    }

    updateDashboard(data);
}

function initDashboard(data) {
    const container = document.getElementById('zonesContainer');
    if (!container) return;
    container.innerHTML = '';
    
    data.zones.forEach(zone => {
        const cardHtml = `
            <div class="glass-panel zone-card" id="card_${zone.id}">
                <div class="zone-header">
                    <div class="zone-name">${zone.name}</div>
                    <div class="zone-status" id="statusLabel_${zone.id}">IDLE</div>
                </div>
                
                <div class="moisture-display">
                    <div class="moisture-label">
                        <span>Bodenfeuchte</span>
                        <span class="moisture-value" id="moistureVal_${zone.id}">0%</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-bar" id="progressBar_${zone.id}"></div>
                    </div>
                </div>

                <div class="moisture-display" id="wateringContainer_${zone.id}" style="display: none; margin-top: 12px;">
                    <div class="moisture-label">
                        <span id="wateringNameVal_${zone.id}">Bewässerung</span>
                        <span class="moisture-value" id="wateringTimeVal_${zone.id}" style="color: var(--accent-blue)">0:00 Min</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-bar" id="wateringBar_${zone.id}" style="background: linear-gradient(90deg, #38bdf8, #818cf8); width: 0%;"></div>
                    </div>
                </div>

                <div class="zone-footer">
                    <div class="stat-item">
                        <span class="stat-label">Lern-Effizienz</span>
                        <span class="stat-value" id="effVal_${zone.id}">1.0x</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Letzte Dauer</span>
                        <span class="stat-value" id="durVal_${zone.id}">0 Min</span>
                    </div>
                </div>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', cardHtml);
    });

    if (data.settings) {
        const settingsContainer = document.getElementById('settingsContainer');
        if (settingsContainer) {
            settingsContainer.innerHTML = `
                <!-- Switches -->
                <div class="setting-row">
                    <div class="setting-label"><span class="setting-icon">&#x23FB;</span> Automatik aktiv</div>
                    <label class="switch">
                        <input type="checkbox" id="setting_AutomaticActive" onchange="requestAction('AutomaticActive', this.checked)">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="setting-row">
                    <div class="setting-label"><span class="setting-icon">&#x23FB;</span> Manuell Starten</div>
                    <label class="switch">
                        <input type="checkbox" id="setting_ManualStart" onchange="requestAction('ForceStart', this.checked)">
                        <span class="slider"></span>
                    </label>
                </div>
                <!-- Sliders -->
                <div class="setting-row">
                    <div class="setting-label"><span class="setting-icon">&#x1F4A7;</span> Bewässerungs-Trigger-Feuchte</div>
                    <div class="setting-control">
                        <input type="range" id="setting_DefaultStartSchwellwert" min="0" max="100" step="5" 
                            onmousedown="window.isDragging=true" onmouseup="window.isDragging=false; requestAction('DefaultStartSchwellwert', parseFloat(this.value))" ontouchend="window.isDragging=false; requestAction('DefaultStartSchwellwert', parseFloat(this.value))"
                            oninput="window.isDragging=true; document.getElementById('val_DefaultStartSchwellwert').innerText = this.value + ' %'">
                        <span id="val_DefaultStartSchwellwert" class="setting-value">-- %</span>
                    </div>
                </div>
                <div class="setting-row">
                    <div class="setting-label"><span class="setting-icon">&#x1F4A7;</span> Bewässerungs-Ziel-Feuchte</div>
                    <div class="setting-control">
                        <input type="range" id="setting_DefaultZielFeuchte" min="0" max="100" step="5" 
                            onmousedown="window.isDragging=true" onmouseup="window.isDragging=false; requestAction('DefaultZielFeuchte', parseFloat(this.value))" ontouchend="window.isDragging=false; requestAction('DefaultZielFeuchte', parseFloat(this.value))"
                            oninput="window.isDragging=true; document.getElementById('val_DefaultZielFeuchte').innerText = this.value + ' %'">
                        <span id="val_DefaultZielFeuchte" class="setting-value">-- %</span>
                    </div>
                </div>
                <div class="setting-row">
                    <div class="setting-label"><span class="setting-icon">&#x23F2;</span> Maximale Bewässerungsdauer</div>
                    <div class="setting-control">
                        <input type="range" id="setting_GlobalMaxDuration" min="5" max="120" step="5" 
                            onmousedown="window.isDragging=true" onmouseup="window.isDragging=false; requestAction('GlobalMaxDuration', parseInt(this.value))" ontouchend="window.isDragging=false; requestAction('GlobalMaxDuration', parseInt(this.value))"
                            oninput="window.isDragging=true; document.getElementById('val_GlobalMaxDuration').innerText = this.value + ' Min'">
                        <span id="val_GlobalMaxDuration" class="setting-value">-- Min</span>
                    </div>
                </div>
                <div class="setting-row">
                    <div class="setting-label"><span class="setting-icon">&#x23F2;</span> Sickerpause</div>
                    <div class="setting-control">
                        <input type="range" id="setting_SickerpauseMinuten" min="5" max="120" step="5" 
                            onmousedown="window.isDragging=true" onmouseup="window.isDragging=false; requestAction('SickerpauseMinuten', parseInt(this.value))" ontouchend="window.isDragging=false; requestAction('SickerpauseMinuten', parseInt(this.value))"
                            oninput="window.isDragging=true; document.getElementById('val_SickerpauseMinuten').innerText = this.value + ' Min'">
                        <span id="val_SickerpauseMinuten" class="setting-value">-- Min</span>
                    </div>
                </div>
            `;
        }
    }
}

function updateDashboard(data) {
    if (data.forecastRainToday !== undefined) {
        const el = document.getElementById('rainToday');
        if (el) el.innerText = parseFloat(data.forecastRainToday).toFixed(1) + ' mm';
    }
    if (data.forecastRainTomorrow !== undefined) {
        const el = document.getElementById('rainTomorrow');
        if (el) el.innerText = parseFloat(data.forecastRainTomorrow).toFixed(1) + ' mm';
    }
    if (data.summaryStatus !== undefined) {
        const el = document.getElementById('summaryStatus');
        if (el) el.innerText = data.summaryStatus;
        const indicator = document.getElementById('statusIndicator');
        if (indicator) {
            if (data.summaryStatus.includes('BewÃ¤ssert:')) {
                indicator.classList.add('active');
                document.getElementById('statusBanner').style.color = 'var(--text-main)';
            } else {
                indicator.classList.remove('active');
                document.getElementById('statusBanner').style.color = 'var(--text-muted)';
            }
        }
    }

    if (data.zones && Array.isArray(data.zones)) {
        data.zones.forEach(zone => {
            if (zone.status !== undefined && zone.status !== false) {
                const label = document.getElementById(`statusLabel_${zone.id}`);
                const wContainer = document.getElementById(`wateringContainer_${zone.id}`);
                if (label) {
                    label.innerText = zone.status;
                    label.classList.remove('watering', 'waiting');
                    if (zone.status === 'WATERING') {
                        label.classList.add('watering');
                        if (wContainer) wContainer.style.display = 'flex';
                    } else if (zone.status === 'WAITING_FOR_RESULT') {
                        label.classList.add('waiting');
                        if (wContainer) wContainer.style.display = 'none';
                    } else {
                        if (wContainer) wContainer.style.display = 'none';
                    }
                }
            }
            
            if (zone.currentSprinkler !== undefined) {
                const nameEl = document.getElementById(`wateringNameVal_${zone.id}`);
                if (nameEl) nameEl.innerText = zone.currentSprinkler ? `Sprinkler: ${zone.currentSprinkler}` : 'Bewässerung';
            }

            if ((zone.status === 'WATERING') && zone.duration) {
                const totalSec = zone.duration * 60;
                let remSec = zone.remainingSeconds || 0;
                if (!zone.remainingSeconds && zone.wateringStart) {
                    const elapsedMs = Date.now() - (zone.wateringStart * 1000);
                    remSec = Math.max(0, totalSec - Math.floor(elapsedMs / 1000));
                }
                
                let progress = 0;
                if (totalSec > 0) {
                    progress = Math.max(0, Math.min(100, ((totalSec - remSec) / totalSec) * 100));
                }
                
                let remMin = Math.floor(remSec / 60);
                let secLeft = Math.floor(remSec % 60);
                let remainingText = remMin + ":" + (secLeft < 10 ? "0" : "") + secLeft + " Min";
                
                const bar = document.getElementById(`wateringBar_${zone.id}`);
                const val = document.getElementById(`wateringTimeVal_${zone.id}`);
                
                if (bar) bar.style.width = progress + "%";
                if (val) val.innerText = remainingText;
            }
            if (zone.moisture !== undefined && zone.moisture !== false) {
                const percent = Math.min(100, Math.max(0, parseFloat(zone.moisture)));
                const valEl = document.getElementById(`moistureVal_${zone.id}`);
                const barEl = document.getElementById(`progressBar_${zone.id}`);
                if (valEl) valEl.innerText = percent.toFixed(1) + '%';
                if (barEl) {
                    barEl.style.width = percent + '%';
                    if (percent < 25) {
                        barEl.style.background = 'linear-gradient(90deg, var(--accent-orange), #ef4444)';
                    } else {
                        barEl.style.background = 'linear-gradient(90deg, var(--accent-green), var(--accent-blue))';
                    }
                }
            }
            if (zone.efficiency !== undefined && zone.efficiency !== false) {
                const effEl = document.getElementById(`effVal_${zone.id}`);
                if (effEl) effEl.innerText = parseFloat(zone.efficiency).toFixed(2) + 'x';
            }
            if (zone.duration !== undefined && zone.duration !== false) {
                const durEl = document.getElementById(`durVal_${zone.id}`);
                if (durEl) durEl.innerText = parseFloat(zone.duration).toFixed(1) + ' Min';
            }
        });
    }

    if (data.settings) {
        const updateSettingBoolean = (key) => {
            const el = document.getElementById(`setting_${key}`);
            if (el) {
                el.checked = !!data.settings[key].value;
            }
        };
        const updateSettingNumber = (key, unit) => {
            const el = document.getElementById(`setting_${key}`);
            const valEl = document.getElementById(`val_${key}`);
            if (el && !window.isDragging) {
                el.value = data.settings[key].value;
                if (valEl) valEl.innerText = parseFloat(data.settings[key].value).toFixed(0) + ' ' + unit;
            }
        };

        updateSettingBoolean('AutomaticActive');
        updateSettingBoolean('ManualStart');
        updateSettingNumber('DefaultStartSchwellwert', '%');
        updateSettingNumber('DefaultZielFeuchte', '%');
        updateSettingNumber('GlobalMaxDuration', 'Min');
        updateSettingNumber('SickerpauseMinuten', 'Min');
    }
}
</script>
</body>
</html>
