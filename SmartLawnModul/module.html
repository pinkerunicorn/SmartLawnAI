<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartLawn AI Dashboard</title>
    <style>
:root {
    --bg-color: #0f172a;
    --panel-bg: rgba(30, 41, 59, 0.7);
    --panel-border: rgba(255, 255, 255, 0.1);
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --accent-blue: #38bdf8;
    --accent-green: #34d399;
    --accent-orange: #fb923c;
    --glass-blur: blur(12px);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
}

body {
    background: var(--bg-color);
    background-image: radial-gradient(circle at top right, rgba(56, 189, 248, 0.1), transparent 40%),
                      radial-gradient(circle at bottom left, rgba(52, 211, 153, 0.05), transparent 40%);
    color: var(--text-main);
    min-height: 100vh;
    padding: 20px;
}

.dashboard-container {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.glass-panel {
    background: var(--panel-bg);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border: 1px solid var(--panel-border);
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
}

.header-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

h1 {
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.5px;
    background: linear-gradient(to right, var(--text-main), var(--accent-blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.weather-info {
    display: flex;
    gap: 24px;
}

.weather-item {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
}

.weather-icon {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
}

.weather-value {
    font-size: 18px;
    font-weight: 600;
    color: var(--accent-blue);
}

.status-banner {
    background: rgba(0, 0, 0, 0.2);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 15px;
    color: var(--text-muted);
}

.status-indicator {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background-color: var(--text-muted);
    transition: all 0.3s ease;
}

.status-indicator.active {
    background-color: var(--accent-blue);
    box-shadow: 0 0 10px var(--accent-blue), 0 0 20px var(--accent-blue);
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { transform: scale(0.95); opacity: 1; }
    50% { transform: scale(1.1); opacity: 0.7; }
    100% { transform: scale(0.95); opacity: 1; }
}

.zones-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
}

.zone-card {
    display: flex;
    flex-direction: column;
    gap: 16px;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.zone-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
}

.zone-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.zone-name {
    font-size: 18px;
    font-weight: 500;
}

.zone-status {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.05);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.zone-status.watering {
    background: rgba(56, 189, 248, 0.1);
    color: var(--accent-blue);
    border: 1px solid rgba(56, 189, 248, 0.3);
}

.zone-status.waiting {
    background: rgba(251, 146, 60, 0.1);
    color: var(--accent-orange);
    border: 1px solid rgba(251, 146, 60, 0.3);
}

.moisture-display {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.moisture-label {
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
}

.moisture-value {
    font-weight: 600;
    color: var(--text-main);
}

.progress-track {
    height: 8px;
    background: rgba(0, 0, 0, 0.3);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent-green), var(--accent-blue));
    border-radius: 4px;
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
}

.zone-footer {
    display: flex;
    justify-content: space-between;
    border-top: 1px solid var(--panel-border);
    padding-top: 12px;
    margin-top: auto;
}

.stat-item {
    display: flex;
    flex-direction: column;
}

.stat-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.stat-value {
    font-size: 14px;
    font-weight: 500;
}

</style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <header class="glass-panel">
            <div class="header-content">
                <h1>SmartLawn AI</h1>
                <div class="weather-info">
                    <div class="weather-item">
                        <span class="weather-icon">ðŸŒ§ï¸ Heute</span>
                        <span id="rainToday" class="weather-value">-- mm</span>
                    </div>
                    <div class="weather-item">
                        <span class="weather-icon">ðŸŒ§ï¸ Morgen</span>
                        <span id="rainTomorrow" class="weather-value">-- mm</span>
                    </div>
                </div>
            </div>
            <div class="status-banner" id="statusBanner">
                <div class="status-indicator" id="statusIndicator"></div>
                <span id="summaryStatus">Initialisiere System...</span>
            </div>
        </header>

        <!-- Zonen Container -->
        <main class="zones-container" id="zonesContainer">
            <!-- Zonen werden dynamisch aus config.js generiert -->
        </main>
    </div>

    <!-- App Logik -->
    <script>
let isInitialized = false;
let wateringIntervals = {};

function handleMessage(dataRaw) {
    let data;
    try {
        data = typeof dataRaw === 'string' ? JSON.parse(dataRaw) : dataRaw;
    } catch (e) {
        console.error("Invalid data format", e);
        return;
    }

    if (!isInitialized && data.zones) {
        initDashboard(data);
        isInitialized = true;
    }

    updateDashboard(data);
}

function initDashboard(data) {
    const container = document.getElementById('zonesContainer');
    if (!container) return;
    container.innerHTML = '';
    
    data.zones.forEach(zone => {
        const cardHtml = `
            <div class="glass-panel zone-card" id="card_${zone.id}">
                <div class="zone-header">
                    <div class="zone-name">${zone.name}</div>
                    <div class="zone-status" id="statusLabel_${zone.id}">IDLE</div>
                </div>
                
                <div class="moisture-display">
                    <div class="moisture-label">
                        <span>Bodenfeuchte</span>
                        <span class="moisture-value" id="moistureVal_${zone.id}">0%</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-bar" id="progressBar_${zone.id}"></div>
                    </div>
                </div>

                <div class="moisture-display" id="wateringContainer_${zone.id}" style="display: none; margin-top: 12px;">
                    <div class="moisture-label">
                        <span>Bewässerung</span>
                        <span class="moisture-value" id="wateringTimeVal_${zone.id}" style="color: var(--accent-blue)">0:00 Min</span>
                    </div>
                    <div class="progress-track">
                        <div class="progress-bar" id="wateringBar_${zone.id}" style="background: linear-gradient(90deg, #38bdf8, #818cf8); width: 0%;"></div>
                    </div>
                </div>

                <div class="zone-footer">
                    <div class="stat-item">
                        <span class="stat-label">Lern-Effizienz</span>
                        <span class="stat-value" id="effVal_${zone.id}">1.0x</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Letzte Dauer</span>
                        <span class="stat-value" id="durVal_${zone.id}">0 Min</span>
                    </div>
                </div>
            </div>
        `;
        container.insertAdjacentHTML('beforeend', cardHtml);
    });
}

function updateDashboard(data) {
    if (data.forecastRainToday !== undefined) {
        const el = document.getElementById('rainToday');
        if (el) el.innerText = parseFloat(data.forecastRainToday).toFixed(1) + ' mm';
    }
    if (data.forecastRainTomorrow !== undefined) {
        const el = document.getElementById('rainTomorrow');
        if (el) el.innerText = parseFloat(data.forecastRainTomorrow).toFixed(1) + ' mm';
    }
    if (data.summaryStatus !== undefined) {
        const el = document.getElementById('summaryStatus');
        if (el) el.innerText = data.summaryStatus;
        const indicator = document.getElementById('statusIndicator');
        if (indicator) {
            if (data.summaryStatus.includes('BewÃ¤ssert:')) {
                indicator.classList.add('active');
                document.getElementById('statusBanner').style.color = 'var(--text-main)';
            } else {
                indicator.classList.remove('active');
                document.getElementById('statusBanner').style.color = 'var(--text-muted)';
            }
        }
    }

    if (data.zones && Array.isArray(data.zones)) {
        data.zones.forEach(zone => {
            if (zone.status !== undefined && zone.status !== false) {
                const label = document.getElementById(`statusLabel_${zone.id}`);
                const wContainer = document.getElementById(`wateringContainer_${zone.id}`);
                if (label) {
                    label.innerText = zone.status;
                    label.classList.remove('watering', 'waiting');
                    if (zone.status === 'WATERING' || zone.status === 'VERIFYING_START') {
                        label.classList.add('watering');
                        if (wContainer) wContainer.style.display = 'flex';
                    } else if (zone.status === 'WAITING_FOR_RESULT') {
                        label.classList.add('waiting');
                        if (wContainer) wContainer.style.display = 'none';
                    } else {
                        if (wContainer) wContainer.style.display = 'none';
                    }
                }
            }

            if ((zone.status === 'WATERING' || zone.status === 'VERIFYING_START') && zone.wateringStart && zone.duration) {
                if (!wateringIntervals[zone.id]) {
                    startWateringProgress(zone.id, zone.wateringStart, zone.duration);
                } else {
                    wateringIntervals[zone.id].start = zone.wateringStart;
                    wateringIntervals[zone.id].duration = zone.duration;
                }
            } else {
                if (wateringIntervals[zone.id]) {
                    clearInterval(wateringIntervals[zone.id].intervalId);
                    delete wateringIntervals[zone.id];
                }
            }
            if (zone.moisture !== undefined && zone.moisture !== false) {
                const percent = Math.min(100, Math.max(0, parseFloat(zone.moisture)));
                const valEl = document.getElementById(`moistureVal_${zone.id}`);
                const barEl = document.getElementById(`progressBar_${zone.id}`);
                if (valEl) valEl.innerText = percent.toFixed(1) + '%';
                if (barEl) {
                    barEl.style.width = percent + '%';
                    if (percent < 25) {
                        barEl.style.background = 'linear-gradient(90deg, var(--accent-orange), #ef4444)';
                    } else {
                        barEl.style.background = 'linear-gradient(90deg, var(--accent-green), var(--accent-blue))';
                    }
                }
            }
            if (zone.efficiency !== undefined && zone.efficiency !== false) {
                const effEl = document.getElementById(`effVal_${zone.id}`);
                if (effEl) effEl.innerText = parseFloat(zone.efficiency).toFixed(2) + 'x';
            }
            if (zone.duration !== undefined && zone.duration !== false) {
                const durEl = document.getElementById(`durVal_${zone.id}`);
                if (durEl) durEl.innerText = parseFloat(zone.duration).toFixed(1) + ' Min';
            }
        });
    }
}

function startWateringProgress(zoneId, startTimestamp, durationMinutes) {
    wateringIntervals[zoneId] = {
        start: startTimestamp,
        duration: durationMinutes,
        intervalId: setInterval(() => {
            const data = wateringIntervals[zoneId];
            if (!data) return;
            
            const totalMs = data.duration * 60 * 1000;
            const elapsedMs = Date.now() - (data.start * 1000);
            
            let progress = 0;
            let remainingText = "0:00 Min";
            
            if (totalMs > 0) {
                progress = Math.max(0, Math.min(100, (elapsedMs / totalMs) * 100));
                let remainingMs = Math.max(0, totalMs - elapsedMs);
                let remSec = Math.floor(remainingMs / 1000);
                let remMin = Math.floor(remSec / 60);
                let secLeft = remSec % 60;
                remainingText = remMin + ":" + (secLeft < 10 ? "0" : "") + secLeft + " Min";
            }
            
            const bar = document.getElementById(`wateringBar_${zoneId}`);
            const val = document.getElementById(`wateringTimeVal_${zoneId}`);
            
            if (bar) bar.style.width = progress + "%";
            if (val) val.innerText = remainingText;
            
        }, 1000)
    };
}
</script>
</body>
</html>
